rules:
- !SHARDING
  tables:
    product_favorites:
      actualDataNodes: mall_recommend_${0..7}.product_favorites_${0..15}
      tableStrategy:
        standard:
          shardingColumn: user_id
          shardingAlgorithmName: pf-table-inline
      databaseStrategy:
        standard:
          shardingColumn: user_id
          shardingAlgorithmName: pf-database-inline
      keyGenerateStrategy:
        column: id
        keyGeneratorName: snowflake
    product_view_record:
      actualDataNodes: mall_recommend_${0..7}.product_view_record_${0..63}
      tableStrategy:
        standard:
          shardingColumn: user_id
          shardingAlgorithmName: pvr-table-inline
      databaseStrategy:
        standard:
          shardingColumn: user_id
          shardingAlgorithmName: pvr-database-inline
      keyGenerateStrategy:
        column: id
        keyGeneratorName: snowflake

  shardingAlgorithms:
    pf-database-inline:
      type: INLINE
      props:
        algorithm-expression: mall_recommend_${user_id % 8}
    pf-table-inline:
      type: INLINE
      props:
        algorithm-expression: product_favorites_${user_id % 16}
    pvr-database-inline:
      type: INLINE
      props:
        algorithm-expression: mall_recommend_${user_id % 8}
    pvr-table-inline:
      type: INLINE
      props:
        algorithm-expression: product_view_record_${user_id % 64}

  keyGenerators:
    snowflake:
      type: SNOWFLAKE

props:
  sql-show: true
