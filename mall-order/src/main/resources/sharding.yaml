rules:
- !SHARDING
  tables:
    t_order:
      actualDataNodes: mall_trade_${0..7}.t_order_${0..31}
      tableStrategy:
        standard:
          shardingColumn: id
          shardingAlgorithmName: t-order-inline
      databaseStrategy:
        standard:
          shardingColumn: id
          shardingAlgorithmName: database-inline-order
      keyGenerateStrategy:
        column: id
        keyGeneratorName: snowflake
    t_order_item:
      actualDataNodes: mall_trade_${0..7}.t_order_item_${0..255}
      tableStrategy:
        standard:
          shardingColumn: order_id
          shardingAlgorithmName: t-order-item-inline
      databaseStrategy:
        standard:
          shardingColumn: order_id
          shardingAlgorithmName: database-inline-item
      keyGenerateStrategy:
        column: id
        keyGeneratorName: snowflake
    t_order_delivery_address:
      actualDataNodes: mall_trade_${0..7}.t_order_delivery_address_${0..31}
      tableStrategy:
        standard:
          shardingColumn: order_id
          shardingAlgorithmName: t-order-address-inline
      databaseStrategy:
        standard:
          shardingColumn: order_id
          shardingAlgorithmName: database-inline-item
      keyGenerateStrategy:
        column: id
        keyGeneratorName: snowflake
    t_order_return_apply:
      actualDataNodes: mall_trade_${0..7}.t_order_return_apply_${0..3}
      tableStrategy:
        standard:
          shardingColumn: order_id
          shardingAlgorithmName: t-order-return-apply-inline
      databaseStrategy:
        standard:
          shardingColumn: order_id
          shardingAlgorithmName: database-inline-item
      keyGenerateStrategy:
        column: id
        keyGeneratorName: snowflake
    t_order_return_item:
      actualDataNodes: mall_trade_${0..7}.t_order_return_item_${0..7}
      tableStrategy:
        standard:
          shardingColumn: order_id
          shardingAlgorithmName: t-order-return-item-inline
      databaseStrategy:
        standard:
          shardingColumn: order_id
          shardingAlgorithmName: database-inline-item
      keyGenerateStrategy:
        column: id
        keyGeneratorName: snowflake
    t_order_return_voucher:
      actualDataNodes: mall_trade_${0..7}.t_order_return_voucher_${0..15}
      tableStrategy:
        standard:
          shardingColumn: order_id
          shardingAlgorithmName: t-order-return-voucher-inline
      databaseStrategy:
        standard:
          shardingColumn: order_id
          shardingAlgorithmName: database-inline-item
      keyGenerateStrategy:
        column: id
        keyGeneratorName: snowflake
  
  bindingTables:
    - t_order,t_order_delivery_address
  
  shardingAlgorithms:
    database-inline-order:
      type: INLINE
      props:
        algorithm-expression: mall_trade_${id % 8}
    database-inline-item:
      type: INLINE
      props:
        algorithm-expression: mall_trade_${order_id % 8}
    t-order-inline:
      type: INLINE
      props:
        algorithm-expression: t_order_${id % 32}
    t-order-item-inline:
      type: INLINE
      props:
        algorithm-expression: t_order_item_${order_id % 256}
    t-order-address-inline:
      type: INLINE
      props:
        algorithm-expression: t_order_delivery_address_${order_id % 32}
    t-order-return-apply-inline:
      type: INLINE
      props:
        algorithm-expression: t_order_return_apply_${order_id % 4}
    t-order-return-item-inline:
      type: INLINE
      props:
        algorithm-expression: t_order_return_item_${order_id % 8}
    t-order-return-voucher-inline:
      type: INLINE
      props:
        algorithm-expression: t_order_return_voucher_${order_id % 16}
  
  keyGenerators:
    snowflake:
      type: SNOWFLAKE

props:
  sql-show: true
